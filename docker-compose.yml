version: '3.9'
services:
  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: local-chromadb
    ports:
      - "8888:8000"  # Corrected: Mac 8888 -> Container 8000
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

volumes:
  chroma-data: