<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>The Vault | Sovereign Intelligence</title>

    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/history@5/umd/history.development.js"></script>
    <script src="https://unpkg.com/react-router@6.3.0/umd/react-router.development.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error": "#ffb4ab",
                        "primary": "#c0c1ff",
                        "secondary": "#b9c8de",
                        "tertiary-container": "#7c87f3",
                        "on-primary-fixed": "#07006c",
                        "outline": "#908fa0",
                        "surface-dim": "#0b1326",
                        "surface": "#0b1326",
                        "background": "#0b1326",
                        "primary-container": "#8083ff",
                        "surface-container": "#171f33",
                        "on-tertiary-container": "#081486",
                        "secondary-fixed-dim": "#b9c8de",
                        "surface-container-lowest": "#060e20",
                        "on-primary-container": "#0d0096",
                        "surface-variant": "#2d3449",
                        "tertiary-fixed-dim": "#bdc2ff",
                        "tertiary": "#bdc2ff",
                        "on-error": "#690005",
                        "inverse-surface": "#dae2fd",
                        "on-tertiary-fixed-variant": "#2f3aa3",
                        "on-tertiary-fixed": "#000767",
                        "secondary-fixed": "#d4e4fa",
                        "surface-container-highest": "#2d3449",
                        "secondary-container": "#39485a",
                        "on-secondary-container": "#a7b6cc",
                        "on-primary": "#1000a9",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-surface-variant": "#c7c4d7",
                        "outline-variant": "#464554",
                        "on-secondary-fixed-variant": "#39485a",
                        "on-tertiary": "#131e8c",
                        "surface-tint": "#c0c1ff",
                        "surface-container-high": "#222a3d",
                        "on-surface": "#dae2fd",
                        "primary-fixed": "#e1e0ff",
                        "surface-bright": "#31394d",
                        "tertiary-fixed": "#e0e0ff",
                        "on-secondary": "#233143",
                        "on-secondary-fixed": "#0d1c2d",
                        "inverse-primary": "#494bd6",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#131b2e",
                        "error-container": "#93000a",
                        "on-background": "#dae2fd",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "inverse-on-surface": "#283044"
                    },
                    fontFamily: {
                        "headline": ["Inter"], "body": ["Inter"],
                        "label": ["Inter"], "inter": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2d3449; border-radius: 10px; }
        .pulse-soft { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .lithographic-glow { background: linear-gradient(45deg, #c0c1ff, #8083ff); box-shadow: 0 0 20px rgba(192, 193, 255, 0.2); }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; background: #c0c1ff; border-radius: 50%; cursor: pointer; }
        .dot-bounce { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    </style>
</head>
<body class="bg-background text-on-surface antialiased overflow-hidden selection:bg-primary/30 selection:text-primary">
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    const { createRoot } = ReactDOM;
    const { MemoryRouter, Routes, Route, Link, useNavigate, useLocation } = ReactRouterDOM;

    // ─── Constants ──────────────────────────────────────────────────────────────
    const API_BASE = 'http://localhost:8080';
    const LS_DOCS  = 'vault_docs_v2';
    const LS_CONVS = 'vault_convs_v2';
    const LS_SETTINGS = 'vault_settings_v2';

    const DEFAULT_SETTINGS = {
        similarityThreshold: 0.70,
        maxResults: 5,
        offlineFirst: true
    };

    // ─── Utilities ───────────────────────────────────────────────────────────────
    const formatSize = (bytes) => {
        if (!bytes) return '—';
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    };

    const formatDate = (iso) => {
        if (!iso) return '—';
        return new Date(iso).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    };

    const getFileIcon = (name = '') => {
        const n = name.toLowerCase();
        if (n.endsWith('.pdf'))                  return { icon: 'picture_as_pdf', color: 'text-red-400',   bg: 'bg-red-900/20' };
        if (n.match(/\.(docx?|doc)$/))           return { icon: 'description',    color: 'text-blue-400',  bg: 'bg-blue-900/20' };
        if (n.match(/\.(xlsx?|xls|csv)$/))       return { icon: 'table_chart',    color: 'text-green-400', bg: 'bg-green-900/20' };
        return                                          { icon: 'article',         color: 'text-slate-400', bg: 'bg-slate-900/20' };
    };

    // ─── API Service ─────────────────────────────────────────────────────────────
    const VaultAPI = {
        async uploadFile(file) {
            const fd = new FormData();
            fd.append('file', file);
            const res = await fetch(`${API_BASE}/api/documents/upload`, { method: 'POST', body: fd });
            if (!res.ok) throw new Error(`Server returned ${res.status}`);
            return res.text();
        },

        async askQuestion(question, settings) {
            const params = new URLSearchParams({
                question,
                minScore:   settings.similarityThreshold,
                maxResults: settings.maxResults
            });
            const res = await fetch(`${API_BASE}/api/chat/ask?${params}`);
            if (!res.ok) throw new Error(`Server returned ${res.status}`);
            return res.json();
        },

        async clearHistory() {
            const res = await fetch(`${API_BASE}/api/chat/clear`, { method: 'POST' });
            return res.text();
        },

        async checkStatus() {
            try {
                const controller = new AbortController();
                setTimeout(() => controller.abort(), 4000);
                const res = await fetch(`${API_BASE}/api/status`, { signal: controller.signal });
                if (res.ok) return res.json();
                return null;
            } catch { return null; }
        }
    };

    // ─── Hooks ───────────────────────────────────────────────────────────────────
    function useLocalStorage(key, def) {
        const [state, setState] = useState(() => {
            try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
            catch { return def; }
        });
        const set = useCallback((val) => {
            setState(prev => {
                const next = typeof val === 'function' ? val(prev) : val;
                try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
                return next;
            });
        }, [key]);
        return [state, set];
    }

    // ─── Micro-components ────────────────────────────────────────────────────────
    const Icon = ({ name, className = '', fill = false }) => (
        <span className={`material-symbols-outlined ${className}`}
              style={fill ? { fontVariationSettings: "'FILL' 1" } : {}}>
            {name}
        </span>
    );

    const Toast = ({ message, type, onClose }) => {
        useEffect(() => { const t = setTimeout(onClose, 4500); return () => clearTimeout(t); }, []);
        const ok = type === 'success';
        return (
            <div className={`fixed bottom-6 right-6 z-[100] flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl border backdrop-blur-xl ${
                ok ? 'bg-green-900/90 border-green-500/30 text-green-300' : 'bg-red-900/90 border-red-500/30 text-red-300'
            }`}>
                <Icon name={ok ? 'check_circle' : 'error'} className="text-sm" fill />
                <p className="text-xs font-medium max-w-xs">{message}</p>
                <button onClick={onClose}><Icon name="close" className="text-sm opacity-60 hover:opacity-100" /></button>
            </div>
        );
    };

    const Topbar = ({ title }) => (
        <header className="fixed top-0 right-0 h-16 bg-[#0b1326]/90 backdrop-blur-xl z-40 flex items-center px-8 border-b border-outline-variant/10 shadow-lg"
                style={{ left: '16rem' }}>
            <h2 className="font-bold tracking-tight text-[#c0c1ff] text-base">{title}</h2>
        </header>
    );

    // ─── Sidebar ─────────────────────────────────────────────────────────────────
    const Sidebar = ({ backendOnline }) => {
        const location = useLocation();
        const navItems = [
            { path: '/',         icon: 'dashboard_customize', label: 'Workspace' },
            { path: '/library',  icon: 'book_5',              label: 'Library'   },
            { path: '/history',  icon: 'history',             label: 'History'   },
            { path: '/settings', icon: 'settings',            label: 'Settings'  },
        ];
        return (
            <aside className="fixed left-0 top-0 h-screen w-64 bg-[#131b2e] flex flex-col py-6 z-50 border-r border-outline-variant/10">
                <div className="px-6 mb-8">
                    <div className="flex items-center gap-3 mb-6">
                        <div className="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center">
                            <Icon name="security" className="text-on-primary-container" fill />
                        </div>
                        <div>
                            <h1 className="text-xl font-bold tracking-tighter text-indigo-400">The Vault</h1>
                            <p className="text-[10px] uppercase tracking-widest text-slate-500 font-semibold">Sovereign Intel</p>
                        </div>
                    </div>
                    <Link to="/">
                        <button className="w-full lithographic-glow text-on-primary py-3 px-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:scale-[0.98] transition-all duration-150 text-sm">
                            <Icon name="add" className="text-sm" /> New Analysis
                        </button>
                    </Link>
                </div>
                <nav className="flex-1 space-y-1">
                    {navItems.map(item => {
                        const active = location.pathname === item.path || (item.path !== '/' && location.pathname.startsWith(item.path));
                        return (
                            <Link key={item.path} to={item.path}
                                  className={`flex items-center px-4 py-3 mx-4 rounded-lg transition-all duration-200 gap-3 text-sm ${
                                      active ? 'text-indigo-400 bg-[#171f33] border-l-4 border-indigo-500 font-semibold'
                                             : 'text-slate-400 hover:text-slate-200 hover:bg-[#171f33]'
                                  }`}>
                                <Icon name={item.icon} fill={active} />{item.label}
                            </Link>
                        );
                    })}
                </nav>
                <div className="px-6 mt-4">
                    <div className={`flex items-center gap-2 px-3 py-2 rounded-lg ${backendOnline ? 'bg-emerald-500/10' : 'bg-red-500/10'}`}>
                        <div className={`w-2 h-2 rounded-full ${backendOnline ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-red-500'}`}></div>
                        <span className="text-[10px] font-medium text-on-surface-variant">
                            {backendOnline ? 'Backend Connected' : 'Backend Offline'}
                        </span>
                    </div>
                </div>
            </aside>
        );
    };

    // ─── Workspace Screen ─────────────────────────────────────────────────────────
    const WorkspaceScreen = ({ documents, setDocuments, conversations, setConversations, settings }) => {
        const [messages, setMessages]         = useState([]);
        const [input, setInput]               = useState('');
        const [isLoading, setIsLoading]       = useState(false);
        const [isDragOver, setIsDragOver]     = useState(false);
        const [isUploading, setIsUploading]   = useState(false);
        const [toast, setToast]               = useState(null);
        const [expandedCites, setExpandedCites] = useState({});
        const [currentConvId, setCurrentConvId] = useState(null);
        const messagesEndRef = useRef(null);
        const fileInputRef   = useRef(null);
        const textareaRef    = useRef(null);

        useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isLoading]);

        const showToast = (message, type) => setToast({ message, type });

        const uploadFile = async (file) => {
            setIsUploading(true);
            try {
                await VaultAPI.uploadFile(file);
                const doc = { id: Date.now().toString(), name: file.name, size: file.size, type: file.type, uploadedAt: new Date().toISOString() };
                setDocuments(prev => [doc, ...prev]);
                showToast(`"${file.name}" ingested successfully`, 'success');
            } catch (err) {
                showToast(`Failed to ingest "${file.name}": ${err.message}`, 'error');
            } finally {
                setIsUploading(false);
            }
        };

        const handleDrop = (e) => {
            e.preventDefault(); setIsDragOver(false);
            Array.from(e.dataTransfer.files).forEach(uploadFile);
        };

        const handleFileSelect = (e) => {
            Array.from(e.target.files).forEach(uploadFile);
            e.target.value = '';
        };

        const clearChat = async () => {
            setMessages([]); setCurrentConvId(null); setExpandedCites({});
            try { await VaultAPI.clearHistory(); } catch {}
        };

        const sendMessage = async () => {
            if (!input.trim() || isLoading) return;
            const question = input.trim();
            setInput('');
            if (textareaRef.current) { textareaRef.current.style.height = 'auto'; }

            const userMsg = { role: 'user', content: question, id: Date.now() };
            setMessages(prev => [...prev, userMsg]);
            setIsLoading(true);

            try {
                const response = await VaultAPI.askQuestion(question, settings);
                const aiMsg = { role: 'ai', content: response.answer, citations: response.citations || [], id: Date.now() + 1 };
                setMessages(prev => {
                    const updated = [...prev, aiMsg];

                    // Persist to conversation history
                    if (!currentConvId) {
                        const newId = Date.now().toString();
                        setCurrentConvId(newId);
                        setConversations(p => [{
                            id: newId, title: question, messages: updated,
                            createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
                        }, ...p]);
                    } else {
                        setConversations(p => p.map(c =>
                            c.id === currentConvId ? { ...c, messages: updated, updatedAt: new Date().toISOString() } : c
                        ));
                    }
                    return updated;
                });
            } catch (err) {
                setMessages(prev => [...prev, {
                    role: 'ai', content: `Connection error: ${err.message}. Make sure the backend is running at ${API_BASE}.`,
                    citations: [], id: Date.now() + 1, isError: true
                }]);
            } finally {
                setIsLoading(false);
            }
        };

        const handleKeyDown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        };

        const suggestions = [
            "What are the key findings?", "Summarize the main points",
            "What risks are identified?", "What are the recommendations?"
        ];

        return (
            <div className="ml-64 h-screen flex flex-col overflow-hidden">
                {/* Header */}
                <header className="fixed top-0 z-40 flex items-center justify-between px-6 h-16 border-b border-outline-variant/10 bg-[#0b1326]"
                        style={{ left: '16rem', right: 0 }}>
                    <span className="text-sm font-bold text-[#c0c1ff]">
                        {documents.length > 0 ? `${documents.length} document${documents.length !== 1 ? 's' : ''} in knowledge base` : 'Workspace — upload a document to begin'}
                    </span>
                    {messages.length > 0 && (
                        <button onClick={clearChat}
                                className="text-xs text-slate-500 hover:text-slate-300 flex items-center gap-1.5 transition-colors px-3 py-1.5 rounded-lg hover:bg-[#171f33]">
                            <Icon name="refresh" className="text-sm" /> Clear Chat
                        </button>
                    )}
                </header>

                <main className="mt-16 flex-1 flex overflow-hidden">
                    {/* LEFT: Knowledge Base */}
                    <section className="w-[30%] bg-[#131b2e] flex flex-col border-r border-outline-variant/10 flex-shrink-0">
                        <div className="p-5 flex flex-col h-full overflow-hidden">
                            <div className="flex items-center justify-between mb-4">
                                <h2 className="text-sm font-bold text-on-surface">Knowledge Base</h2>
                                {documents.length > 0 && (
                                    <button onClick={() => setDocuments([])} className="text-[10px] text-slate-600 hover:text-red-400 transition-colors">Clear All</button>
                                )}
                            </div>

                            {/* Drop Zone */}
                            <div onDragOver={(e) => { e.preventDefault(); setIsDragOver(true); }}
                                 onDragLeave={() => setIsDragOver(false)}
                                 onDrop={handleDrop}
                                 onClick={() => !isUploading && fileInputRef.current?.click()}
                                 className={`border-2 border-dashed rounded-2xl p-5 flex flex-col items-center justify-center text-center transition-all cursor-pointer mb-4 ${
                                     isDragOver   ? 'border-primary bg-primary/10 scale-[0.99]'
                                     : isUploading ? 'border-amber-500/40 bg-amber-500/5 cursor-wait'
                                                  : 'border-outline-variant/30 bg-[#171f33]/50 hover:bg-[#171f33] hover:border-primary/40'
                                 }`}>
                                <input ref={fileInputRef} type="file" className="hidden" multiple
                                       accept=".pdf,.doc,.docx,.txt,.csv,.xlsx,.xls,.pptx"
                                       onChange={handleFileSelect} />
                                {isUploading ? (
                                    <>
                                        <div className="w-10 h-10 rounded-full bg-amber-500/20 flex items-center justify-center mb-2 animate-pulse">
                                            <Icon name="upload" className="text-amber-400" />
                                        </div>
                                        <p className="text-xs font-medium text-amber-400">Ingesting & vectorizing…</p>
                                        <p className="text-[10px] text-slate-500 mt-1">This may take 30–60 s</p>
                                    </>
                                ) : isDragOver ? (
                                    <>
                                        <div className="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center mb-2">
                                            <Icon name="file_download" className="text-primary" />
                                        </div>
                                        <p className="text-xs font-medium text-primary">Drop to ingest</p>
                                    </>
                                ) : (
                                    <>
                                        <div className="w-10 h-10 rounded-full bg-secondary-container/30 flex items-center justify-center mb-2">
                                            <Icon name="upload_file" className="text-primary" />
                                        </div>
                                        <p className="text-xs font-medium text-on-surface">Drop files or click to browse</p>
                                        <p className="text-[10px] text-on-surface-variant mt-1">PDF, DOCX, TXT, CSV, XLSX</p>
                                    </>
                                )}
                            </div>

                            {/* Document List */}
                            <div className="flex-1 overflow-y-auto custom-scrollbar">
                                {documents.length === 0 ? (
                                    <div className="text-center py-6">
                                        <Icon name="inbox" className="text-slate-700 text-4xl" />
                                        <p className="text-[11px] text-slate-600 mt-2">No documents yet</p>
                                    </div>
                                ) : (
                                    <>
                                        <p className="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold mb-3">
                                            Ingested ({documents.length})
                                        </p>
                                        <div className="space-y-2">
                                            {documents.map(doc => {
                                                const { icon, color, bg } = getFileIcon(doc.name);
                                                return (
                                                    <div key={doc.id} className="p-3 bg-[#171f33] rounded-xl flex items-center gap-3 group hover:bg-[#1d2640] transition-colors">
                                                        <div className={`w-8 h-8 rounded-lg ${bg} flex items-center justify-center flex-shrink-0`}>
                                                            <Icon name={icon} className={`${color} text-sm`} />
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <p className="text-[11px] font-semibold text-on-surface truncate">{doc.name}</p>
                                                            <p className="text-[10px] text-on-surface-variant">{formatSize(doc.size)}</p>
                                                        </div>
                                                        <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0">
                                                            <Icon name="check_circle" className="text-green-400 text-sm" fill />
                                                            <button onClick={() => setDocuments(prev => prev.filter(d => d.id !== doc.id))}
                                                                    className="text-slate-600 hover:text-red-400 transition-colors ml-1">
                                                                <Icon name="delete" className="text-sm" />
                                                            </button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </>
                                )}
                            </div>

                            {/* Status */}
                            <div className="mt-4 pt-4 border-t border-outline-variant/10">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
                                    <span className="text-[10px] font-medium text-on-surface-variant">100% Local • No cloud</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* RIGHT: Chat */}
                    <section className="flex-1 bg-[#0b1326] flex flex-col overflow-hidden">
                        {/* Messages */}
                        <div className="flex-1 overflow-y-auto custom-scrollbar p-8 space-y-6">
                            {messages.length === 0 && !isLoading && (
                                <div className="h-full flex flex-col items-center justify-center text-center min-h-[400px]">
                                    <div className="w-16 h-16 rounded-2xl bg-primary-container/20 flex items-center justify-center mb-4">
                                        <Icon name="auto_awesome" className="text-primary text-3xl" fill />
                                    </div>
                                    <h3 className="text-xl font-bold text-on-surface mb-2">Sovereign Intelligence Ready</h3>
                                    <p className="text-sm text-on-surface-variant max-w-sm mb-8 leading-relaxed">
                                        Upload a document to your Knowledge Base, then ask anything about it.<br/>
                                        The CRAG engine will verify every source before answering.
                                    </p>
                                    <div className="grid grid-cols-2 gap-3 max-w-md w-full">
                                        {suggestions.map(q => (
                                            <button key={q} onClick={() => setInput(q)}
                                                    className="px-4 py-3 bg-[#171f33] hover:bg-[#222a3d] rounded-xl text-xs text-left text-on-surface-variant hover:text-on-surface transition-all border border-outline-variant/10">
                                                {q}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {messages.map(msg => (
                                <div key={msg.id} className={`flex ${msg.role === 'user' ? 'justify-end' : 'flex-col gap-2'}`}>
                                    {msg.role === 'user' ? (
                                        <div className="max-w-[75%] bg-[#222a3d] p-4 rounded-2xl rounded-tr-none border border-outline-variant/10">
                                            <p className="text-sm text-on-surface leading-relaxed">{msg.content}</p>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="flex items-center gap-2 flex-wrap">
                                                <div className="w-6 h-6 rounded bg-primary-container/20 flex items-center justify-center flex-shrink-0">
                                                    <Icon name="auto_awesome" className="text-primary text-xs" fill />
                                                </div>

        const [backendOnline, setBackendOnline] = useState(false);

        useEffect(() => {
            const check = async () => {
                const status = await VaultAPI.checkStatus();
                setBackendOnline(!!status);
            };
            check();
            const interval = setInterval(check, 30000);
            return () => clearInterval(interval);
        }, []);

        return (
            <div className="flex bg-background h-screen overflow-hidden">
                <Sidebar backendOnline={backendOnline} />
                <div className="flex-1 relative overflow-hidden">
                    <Routes>
                        <Route path="/" element={
                            <WorkspaceScreen documents={documents} setDocuments={setDocuments}
                                             conversations={conversations} setConversations={setConversations}
                                             settings={settings} />
                        } />
                        <Route path="/library" element={
                            <LibraryScreen documents={documents} setDocuments={setDocuments}
                                           conversations={conversations} />
                        } />
                        <Route path="/history" element={
                            <HistoryScreen conversations={conversations} setConversations={setConversations} />
                        } />
                        <Route path="/settings" element={
                            <SettingsScreen settings={settings} setSettings={setSettings} backendStatus={backendOnline} />
                        } />
                    </Routes>
                </div>
            </div>
        );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<MemoryRouter><App /></MemoryRouter>);
</script>
</body>
</html>
