spring.application.name=local-notebooklm

# ── Ollama — Generation model ─────────────────────────────────────────────────
# gemma2 = Gemma 2 9B by Google. Better instruction-following and grounding
# than llama3. Requires ~8 GB VRAM. Run: ollama pull gemma2
langchain4j.ollama.chat-model.base-url=${LANGCHAIN4J_OLLAMA_CHAT_MODEL_BASE_URL:http://localhost:11434}
langchain4j.ollama.chat-model.model-name=gemma2
langchain4j.ollama.chat-model.temperature=0.0

# ── Ollama — Embedding model ──────────────────────────────────────────────────
# mxbai-embed-large: 1024-dim, trained for asymmetric retrieval (query vs passage).
# Outperforms nomic-embed-text on MTEB retrieval benchmark.
# Run: ollama pull mxbai-embed-large
# WARNING: changing this model requires make clean + full re-ingestion of all docs.
langchain4j.ollama.embedding-model.base-url=${LANGCHAIN4J_OLLAMA_EMBEDDING_MODEL_BASE_URL:http://localhost:11434}
langchain4j.ollama.embedding-model.model-name=mxbai-embed-large

# ── ChromaDB ──────────────────────────────────────────────────────────────────
chroma.base-url=${CHROMA_BASE_URL:http://localhost:8888}

# ── RAG Pipeline Settings ─────────────────────────────────────────────────────
# Query expansion mode: hyde | multi-query | none
#   hyde        — generate a hypothetical document passage via LLM, embed that instead of
#                 the raw question. Better semantic alignment with passage-encoder (1 LLM call).
#   multi-query — generate 3 paraphrases + original (1 LLM call + 4 embedding calls)
#   none        — embed question directly (fastest, least accurate)
rag.query-expansion.mode=hyde

# Batch CRAG minimum relevance score (1–5). Passages scoring below this are rejected.
# 4 = "mostly answers the question" — good balance of precision vs recall for factoid queries.
rag.crag.batch.min-score=3
# Lower thresholds for synthesis (summarize, overview) and code-search (short queries on code docs).
# Score 3 = "partially relevant" is enough for synthesis and code demonstration chunks.
rag.crag.batch.min-score.synthesis=3
rag.crag.batch.min-score.code=3
# Relax retrieval similarity floor for synthesis/code queries.
# mxbai-embed-large with broad/code embeddings can score as low as 0.20 for valid matches.
rag.retrieval.min-score.relax-for-synthesis=0.20
rag.retrieval.min-score.relax-for-code=0.20
# Relax for ALL query types on code-heavy documents
rag.retrieval.min-score.relax-for-factoid=0.20

# ── OCR ───────────────────────────────────────────────────────────────────────
# Tesseract trained-data path. Default matches the Alpine Docker image location.
# Override with OCR_TESSDATA_PATH env var for local dev (e.g. /usr/local/share/tessdata on macOS).
ocr.tesseract.datapath=${OCR_TESSDATA_PATH:/usr/share/tessdata}

# ── File upload limits ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
# Raised to 200 MB to support batch uploads of multiple 50 MB files in one request
spring.servlet.multipart.max-request-size=200MB

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8081
server.address=0.0.0.0

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Distributed Inference Router ──────────────────────────────
# Set to true to enable distributed routing across team laptops
inference.distributed.enabled=true

# Node registry — format: id|http://ip:port|maxConcurrent
# Add one entry per team laptop (comma-separated)
# Leave empty to disable distributed mode entirely
inference.distributed.nodes=myself|http://<YOUR-LAN-IP>:11434|2

# Model to use on remote nodes (leave blank to reuse existing model config)
inference.distributed.default-model=

# Health check settings
inference.distributed.healthcheck.interval-seconds=10
inference.distributed.healthcheck.max-failures=3

# Set to true to expose /api/inference/nodes admin endpoints
inference.distributed.admin.enabled=true
# ──────────────────────────────────────────────────────────────
