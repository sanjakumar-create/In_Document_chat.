spring.application.name=local-notebooklm

# ── Ollama — Generation model ─────────────────────────────────────────────────
# Used for CRAG chunk evaluation (YES/NO grading) and final answer synthesis.
# Override LANGCHAIN4J_OLLAMA_CHAT_MODEL_BASE_URL env var when running in Docker.
langchain4j.ollama.chat-model.base-url=${LANGCHAIN4J_OLLAMA_CHAT_MODEL_BASE_URL:http://localhost:11434}
langchain4j.ollama.chat-model.model-name=llama3
langchain4j.ollama.chat-model.temperature=0.0

# ── Ollama — Embedding model ──────────────────────────────────────────────────
# Used to convert text chunks and questions into vectors.
# Must be the same model at both ingestion time and query time.
# Override LANGCHAIN4J_OLLAMA_EMBEDDING_MODEL_BASE_URL env var when running in Docker.
langchain4j.ollama.embedding-model.base-url=${LANGCHAIN4J_OLLAMA_EMBEDDING_MODEL_BASE_URL:http://localhost:11434}
langchain4j.ollama.embedding-model.model-name=nomic-embed-text

# ── ChromaDB ──────────────────────────────────────────────────────────────────
# Override CHROMA_BASE_URL env var when running in Docker (uses service name + internal port).
chroma.base-url=${CHROMA_BASE_URL:http://localhost:8888}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.port=8081