spring.application.name=local-notebooklm

# ── Ollama — Generation model ─────────────────────────────────────────────────
# gemma2 = Gemma 2 9B by Google. Better instruction-following and grounding
# than llama3. Requires ~8 GB VRAM. Run: ollama pull gemma2
langchain4j.ollama.chat-model.base-url=${LANGCHAIN4J_OLLAMA_CHAT_MODEL_BASE_URL:http://localhost:11434}
langchain4j.ollama.chat-model.model-name=gemma2
langchain4j.ollama.chat-model.temperature=0.0

# ── Ollama — Embedding model ──────────────────────────────────────────────────
# mxbai-embed-large: 1024-dim, trained for asymmetric retrieval (query vs passage).
# Outperforms nomic-embed-text on MTEB retrieval benchmark.
# Run: ollama pull mxbai-embed-large
# WARNING: changing this model requires make clean + full re-ingestion of all docs.
langchain4j.ollama.embedding-model.base-url=${LANGCHAIN4J_OLLAMA_EMBEDDING_MODEL_BASE_URL:http://localhost:11434}
langchain4j.ollama.embedding-model.model-name=mxbai-embed-large

# ── ChromaDB ──────────────────────────────────────────────────────────────────
chroma.base-url=${CHROMA_BASE_URL:http://localhost:8888}

# ── File upload limits ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8081

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
