<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sovereign Intelligence | The Vault</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/history@5/umd/history.development.js"></script>
    <script src="https://unpkg.com/react-router@6.3.0/umd/react-router.development.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c0c1ff",
                        "surface": "#0b1326",
                        "background": "#0b1326",
                        "primary-container": "#8083ff",
                        "surface-container": "#171f33",
                        "surface-container-low": "#131b2e",
                        "surface-container-high": "#222a3d",
                        "on-surface": "#dae2fd",
                        "on-surface-variant": "#c7c4d7",
                        "tertiary": "#bdc2ff",
                        "outline-variant": "#464554",
                    },
                    fontFamily: {
                        "inter": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2d3449; border-radius: 10px; }
    </style>
</head>
<body class="bg-background text-on-surface antialiased overflow-hidden selection:bg-primary/30 selection:text-primary">
<div id="root"></div>

<script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { createRoot } = ReactDOM;
    const { MemoryRouter, Routes, Route, Link, useLocation } = ReactRouterDOM;

    // --- Sidebar Component ---
    const Sidebar = () => {
        const location = useLocation();
        const navItems = [
            { path: '/', icon: 'dashboard_customize', label: 'Workspace' },
            { path: '/library', icon: 'book_5', label: 'Library' },
            { path: '/settings', icon: 'settings', label: 'Settings' },
        ];

        return (
            <aside className="fixed left-0 top-0 h-screen w-64 bg-[#131b2e] flex flex-col py-6 z-50">
                <div className="px-6 mb-10">
                    <div className="flex items-center gap-3 mb-6">
                        <div className="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center">
                            <span className="material-symbols-outlined text-white" style={{ fontVariationSettings: "'FILL' 1" }}>security</span>
                        </div>
                        <div>
                            <h1 className="text-xl font-bold tracking-tighter text-indigo-400">The Vault <span className="text-xs text-green-400 ml-1">v2.0</span></h1>
                            <p className="text-[10px] uppercase tracking-widest text-slate-500 font-semibold">Sovereign Intel</p>
                        </div>
                    </div>
                    <button onClick={() => window.location.reload()} className="w-full bg-indigo-500 text-white py-3 px-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-600 transition-all">
                        <span className="material-symbols-outlined text-sm">add</span>
                        <span className="text-sm">New Analysis</span>
                    </button>
                </div>
                <nav className="flex-1 space-y-1">
                    {navItems.map((item) => {
                        const isActive = location.pathname === item.path;
                        return (
                            <Link key={item.path} to={item.path} className={`flex items-center px-4 py-3 mx-4 rounded-lg transition-all gap-3 ${isActive ? 'text-indigo-400 bg-[#171f33] border-l-4 border-indigo-500 font-semibold' : 'text-slate-400 hover:text-slate-200 hover:bg-[#171f33]'}`}>
                                <span className="material-symbols-outlined">{item.icon}</span>
                                {item.label}
                            </Link>
                        );
                    })}
                </nav>
            </aside>
        );
    };

    // --- Workspace (Main Chat) Component ---
    const Workspace = () => {
        const [question, setQuestion] = useState('');
        const [chatHistory, setChatHistory] = useState([]);
        const [isLoading, setIsLoading] = useState(false);
        const [uploadedFiles, setUploadedFiles] = useState([]);
        const [isUploading, setIsUploading] = useState(false);
        const fileInputRef = useRef(null);
        const chatEndRef = useRef(null);

        // Auto-scroll chat to bottom
        useEffect(() => {
            chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
        }, [chatHistory]);

        // 🔒 THE BULLETPROOF FIX
        const handleAskQuestion = async (predefinedQuestion = null) => {
            let textToAsk = question;
            if (typeof predefinedQuestion === 'string') {
                textToAsk = predefinedQuestion;
            }
            if (!textToAsk || !textToAsk.trim()) return;

            // 1. Figure out which file we are talking about
            const currentFile = uploadedFiles.length > 0 ? uploadedFiles[uploadedFiles.length - 1].name : "";

            if (!currentFile) {
                setChatHistory(prev => [...prev, { role: 'ai', text: "⚠️ Please upload a document first!" }]);
                return;
            }

            setChatHistory(prev => [...prev, { role: 'user', text: textToAsk }]);
            setQuestion('');
            setIsLoading(true);

            try {
                // 2. THIS IS THE MAGIC! Safely encodes the '#' and '?' characters!
                const params = new URLSearchParams();
                params.append("question", textToAsk);
                params.append("filename", currentFile);

                const requestUrl = `http://localhost:8080/api/chat/ask?${params.toString()}`;
                console.log("🚀 SENDING REQUEST TO:", requestUrl);

                const response = await fetch(requestUrl);

                if (!response.ok) {
                    console.error("Backend rejected with status:", response.status);
                    throw new Error("Server returned status " + response.status);
                }

                const data = await response.json();
                setChatHistory(prev => [...prev, { role: 'ai', text: data.answer, citations: data.citations }]);
            } catch (error) {
                console.error("Fetch failed:", error);
                setChatHistory(prev => [...prev, { role: 'ai', text: "❌ Connection error: Server returned 400. Make sure the backend is running at http://localhost:8080." }]);
            } finally {
                setIsLoading(false);
            }
        };

        // Handle File Upload
        const handleFileChange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            setIsUploading(true);
            const formData = new FormData();
            formData.append('file', file); // Sending actual file bytes!

            try {
                const response = await fetch('http://localhost:8080/api/documents/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    setUploadedFiles(prev => [...prev, { name: file.name, size: (file.size / 1024).toFixed(1) + ' KB' }]);
                } else {
                    alert("Upload failed. Ensure backend accepts multipart files and 413 error is fixed.");
                }
            } catch (error) {
                alert("Network error connecting to backend.");
            } finally {
                setIsUploading(false);
                e.target.value = null; // reset input
            }
        };

        return (
            <div className="ml-64 h-screen flex flex-col relative overflow-hidden">
                <main className="h-screen flex overflow-hidden w-full">

                    {/* --- Knowledge Base Sidebar --- */}
                    <section className="w-[30%] bg-surface-container-low flex flex-col border-r border-outline-variant/10 p-6 z-10">
                        <h2 className="text-xl font-bold text-on-surface tracking-tight mb-8">Knowledge Base</h2>

                        {/* Upload Area */}
                        <input type="file" ref={fileInputRef} onChange={handleFileChange} className="hidden" accept=".pdf,.txt,.docx" />
                        <div
                            onClick={() => fileInputRef.current.click()}
                            className={`border-2 border-dashed border-outline-variant/30 rounded-2xl p-8 flex flex-col items-center justify-center text-center transition-colors cursor-pointer mb-8 ${isUploading ? 'bg-indigo-900/20' : 'bg-surface-container/50 hover:bg-surface-container'}`}
                        >
                            <div className="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center mb-4">
                                <span className="material-symbols-outlined text-primary">{isUploading ? 'sync' : 'upload_file'}</span>
                            </div>
                            <p className="text-sm font-medium text-on-surface">{isUploading ? 'Uploading...' : 'Click to browse files'}</p>
                            <p className="text-[11px] text-on-surface-variant mt-1">PDF, DOCX, TXT support (Max 50MB)</p>
                        </div>

                        {/* Ingested Files List */}
                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                            <h3 className="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold mb-4">Ingested Documents ({uploadedFiles.length})</h3>
                            <div className="space-y-3">
                                {uploadedFiles.map((file, idx) => (
                                    <div key={idx} className="p-3 bg-surface-container rounded-xl flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-lg bg-indigo-900/20 flex items-center justify-center">
                                            <span className="material-symbols-outlined text-indigo-400 text-sm">description</span>
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-xs font-semibold text-on-surface truncate">{file.name}</p>
                                            <p className="text-[10px] text-on-surface-variant">{file.size}</p>
                                        </div>
                                    </div>
                                ))}
                                {uploadedFiles.length === 0 && <p className="text-xs text-slate-500 text-center mt-10">No documents in vault.</p>}
                            </div>
                        </div>
                    </section>

                    {/* --- Chat Interface --- */}
                    <section className="w-[70%] bg-surface flex flex-col relative">
                        <div className="flex-1 overflow-y-auto custom-scrollbar p-8 space-y-8">

                            {/* Welcome Screen if chat is empty */}
                            {chatHistory.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-center">
                                    <div className="w-16 h-16 bg-primary-container/20 rounded-2xl flex items-center justify-center mb-6">
                                        <span className="material-symbols-outlined text-3xl text-primary">auto_awesome</span>
                                    </div>
                                    <h2 className="text-2xl font-bold mb-2">Sovereign Intelligence Ready</h2>
                                    <p className="text-on-surface-variant mb-12 max-w-md">Upload a document to your Knowledge Base, then ask anything about it. The CRAG engine will verify every source.</p>

                                    <div className="grid grid-cols-2 gap-4 w-full max-w-2xl">
                                        {["What are the key findings?", "Summarize the main points", "What risks are identified?", "What are the recommendations?"].map((q, i) => (
                                            <button key={i} onClick={(e) => { e.preventDefault(); handleAskQuestion(q); }} className="p-4 bg-surface-container rounded-xl text-sm text-slate-300 hover:bg-surface-container-high transition-colors text-left border border-outline-variant/10">
                                                {q}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                /* Active Chat Messages */
                                chatHistory.map((msg, index) => (
                                    <div key={index} className={`flex flex-col gap-4 ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                        {msg.role === 'ai' && (
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="material-symbols-outlined text-primary text-xs">auto_awesome</span>
                                                <span className="text-[10px] font-bold text-primary uppercase tracking-widest">Sovereign Intel</span>
                                            </div>
                                        )}
                                        <div className={`max-w-[80%] p-5 shadow-xl border border-outline-variant/10 ${msg.role === 'user' ? 'bg-surface-container-high rounded-2xl rounded-tr-none' : 'bg-surface-container rounded-2xl rounded-tl-none border-l-4 border-tertiary'}`}>
                                            <p className="text-sm text-on-surface leading-relaxed whitespace-pre-wrap">{msg.text}</p>

                                            {msg.citations && msg.citations.length > 0 && msg.citations[0] !== "No relevant sources found." && (
                                                <div className="mt-4 pt-4 border-t border-outline-variant/20">
                                                    <p className="text-[10px] font-bold text-on-surface-variant uppercase mb-2">Verified Sources:</p>
                                                    <ul className="space-y-2">
                                                        {msg.citations.map((cite, i) => (
                                                            <li key={i} className="text-[11px] text-on-surface-variant/70 italic border-l-2 border-primary/30 pl-2">"{cite}"</li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))
                            )}

                            {isLoading && (
                                <div className="flex items-center gap-2 text-primary animate-pulse">
                                    <span className="material-symbols-outlined text-sm">hourglass_empty</span>
                                    <span className="text-xs font-bold uppercase tracking-widest">Processing via Local LLM...</span>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        {/* Input Box */}
                        <div className="p-6 bg-surface-container-low border-t border-outline-variant/10">
                            <div className="max-w-4xl mx-auto flex flex-col gap-3">
                                <div className="relative">
                                    <input
                                        value={question}
                                        onChange={(e) => setQuestion(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleAskQuestion()}
                                        disabled={isLoading}
                                        className="w-full bg-surface-container-high border border-outline-variant/20 rounded-2xl py-4 pl-6 pr-16 text-sm text-on-surface focus:outline-none focus:border-primary/50 transition-all placeholder-on-surface-variant/50 disabled:opacity-50"
                                        placeholder="Ask anything about your documents..."
                                        type="text"
                                    />
                                    <button onClick={(e) => { e.preventDefault(); handleAskQuestion(); }} disabled={isLoading || !question.trim()} className="absolute right-3 top-2.5 w-10 h-10 bg-primary-container text-on-primary-container rounded-xl flex items-center justify-center hover:bg-primary transition-all disabled:opacity-50">
                                        <span className="material-symbols-outlined">send</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>
                </main>
            </div>
        );
    };

    const App = () => (
        <div className="flex bg-background h-screen overflow-hidden">
            <Sidebar />
            <div className="flex-1 relative">
                <Routes>
                    <Route path="/" element={<Workspace />} />
                    <Route path="*" element={<div className="ml-64 p-8">Work in progress...</div>} />
                </Routes>
            </div>
        </div>
    );

    const root = createRoot(document.getElementById('root'));
    root.render(<MemoryRouter><App /></MemoryRouter>);
</script>
</body>
</html>
