                                </div>
                                <div className="flex gap-4 pt-4">
                                    <button className="flex-1 bg-surface-container-highest text-on-surface border border-outline-variant/20 py-3 rounded-xl font-semibold hover:bg-surface-variant transition-all">Reset Defaults</button>
                                    <button className="flex-1 lithographic-glow text-on-primary py-3 rounded-xl font-bold">Save Changes</button>
                                </div>
                            </aside>
                        </div>
                    </main>
                    <div className="fixed bottom-0 right-0 w-1/3 h-1/2 bg-indigo-500/5 blur-[120px] rounded-full -z-10 pointer-events-none"></div>
                    <div className="fixed top-0 left-64 w-64 h-64 bg-violet-500/5 blur-[100px] rounded-full -z-10 pointer-events-none"></div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="flex bg-background h-screen overflow-hidden">
                    <Sidebar />
                    <div className="flex-1 relative">
                        <Routes>
                            <Route path="/" element={<Workspace />} />
                            <Route path="/library" element={<Library />} />
                            <Route path="/history" element={<Library />} /> {/* Reusing Library for now to satisfy links */}
                            <Route path="/settings" element={<Settings />} />
                        </Routes>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );
    </script>
</body>
